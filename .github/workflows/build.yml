name: Build

on:
  push:
    branches:
      - main
    paths:
      - "**.nix"
      - flake.lock
      - .github/workflows/*.yml
  merge_group:
  pull_request:
    branches: ["*"]
    paths:
      - "**.nix"
      - flake.lock
      - .github/workflows/*.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: [X64, Linux]
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          diagnostic-endpoint: ""
          extra-conf: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= just-one-more-cache.cachix.org-1:4nShcKEgcUEVlJqKFrgDwoGfqLnw5KPG4UDTV02jnr4=
            substituters = https://cache.nixos.org/ https://just-one-more-cache.cachix.org/
      - uses: yaxitech/nix-install-pkgs-action@v7
        with:
          packages: "nixpkgs#omnix, github:juspay/cachix-push"
      - uses: cachix/cachix-action@v17
        with:
          name: just-one-more-cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - if: env.BRANCH_NAME == 'main'
        run: |
          # build (main branch)
          set -euxo pipefail
          om ci run --include-all-dependencies --results=om.json -- --show-trace
          cachix-push --cache just-one-more-repo --subflake ROOT --prefix "${BRANCH_NAME}" < om.json
      - if: env.BRANCH_NAME != 'main'
        name: build (${{ github.head_ref || github.ref_name }})
        run: |
          # build ("${{ env.BRANCH_NAME }}" branch)
          set -euxo pipefail
          om ci run --include-all-dependencies -- --show-trace | xargs cachix push just-one-more-cache
